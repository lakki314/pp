# Apache HTTPD configuration for Middleware JVM Restart
# Apache serves static UI files. Flask still handles LDAP login, sessions, API, history, and Ansible Controller calls.
# Replace hostnames, certificate paths, and filesystem paths for your environment.

<VirtualHost *:443>
    ServerName middleware-jvm-restart.example.com

    SSLEngine on
    SSLCertificateFile /etc/pki/tls/certs/middleware-jvm-restart.crt
    SSLCertificateKeyFile /etc/pki/tls/private/middleware-jvm-restart.key

    ErrorLog logs/middleware-jvm-restart_error.log
    CustomLog logs/middleware-jvm-restart_access.log combined

    # Static UI from Apache. No LDAP authentication is configured in Apache.
    DocumentRoot /opt/middleware-jvm-restart/ui
    DirectoryIndex index.html

    AliasMatch ^/$ /opt/middleware-jvm-restart/ui/index.html
    Alias /index.html /opt/middleware-jvm-restart/ui/index.html
    Alias /css/ /opt/middleware-jvm-restart/ui/css/
    Alias /js/ /opt/middleware-jvm-restart/ui/js/

    <Directory "/opt/middleware-jvm-restart/ui">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Flask backend under Apache mod_wsgi.
    # /login, /logout, /api/*, /health, and Flask /static/* are handled by this WSGI app.
    WSGIDaemonProcess middleware_jvm_restart \
        python-path=/opt/middleware-jvm-restart/app:/opt/middleware-jvm-restart/app/vendor/site-packages \
        processes=2 \
        threads=15

    WSGIProcessGroup middleware_jvm_restart
    WSGIPassAuthorization On
    WSGIScriptAlias / /opt/middleware-jvm-restart/app/wsgi.py

    <Directory "/opt/middleware-jvm-restart/app">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

</VirtualHost>
