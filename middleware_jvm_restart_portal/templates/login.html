<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Middleware JVM Restart</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <div class="brand-mark login-brand">A</div>
      <p class="eyebrow">Middleware Automation Portal</p>
      <h1>Middleware JVM Restart</h1>
      <p class="hero-copy">Sign in with your enterprise account. Access is restricted to the configured LDAP group.</p>
      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
      <form method="post" class="login-form">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button class="btn btn-primary login-button" type="submit">Sign in</button>
      </form>
      <div class="login-note">Mode: {% if ldap_enabled %}LDAP group authentication{% else %}Local development login{% endif %}</div>
    </section>
  </main>
</body>
</html>
